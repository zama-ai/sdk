name: Playwright

on:
  workflow_run:
    workflows: [Vitest]
    types: [completed]

jobs:
  test:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      # Build the Next.js test-app (CI uses `pnpm start` not `pnpm dev:e2e`)
      - run: pnpm build:test-app
        env:
          NEXT_PUBLIC_NETWORK: hardhat

      # Install hardhat dependencies (uses npm, not pnpm)
      - run: pnpm hardhat:install

      # Install Playwright browsers
      - run: pnpm --filter @zama-fhe/test-app exec playwright install --with-deps chromium

      - run: pnpm e2e:test

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: packages/test-app/playwright/test-results/
          retention-days: 7
