name: Release

on:
  push:
    branches: [main, prerelease]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

defaults:
  run:
    shell: bash -euo pipefail {0}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  vitest:
    uses: ./.github/workflows/vitest.yml

  playwright:
    uses: ./.github/workflows/playwright.yml
    secrets:
      SUBMODULE_TOKEN: ${{ secrets.SUBMODULE_TOKEN }}

  api-report:
    if: github.event_name == 'push'
    uses: ./.github/workflows/api-report.yml

  release:
    needs: [vitest, playwright, api-report]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 22
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Ensure npm 11
        run: |
          npm i -g npm@^11
          npm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Semantic release
        run: pnpm release:ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: false # Re-enable once repo is public
