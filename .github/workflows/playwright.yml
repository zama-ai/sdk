name: Playwright

on:
  pull_request:
    branches: [main, prerelease]
  workflow_call:
    secrets:
      SUBMODULE_TOKEN:
        required: true

concurrency:
  group: playwright-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Checkout submodules
        run: |
          git config --global url."https://${{ secrets.SUBMODULE_TOKEN }}@github.com/".insteadOf "https://github.com/"
          git submodule sync --recursive
          git submodule update --init --recursive --depth=1

      - name: Setup pnpm
        uses: pnpm/action-setup@9fd676a19091d4595eefd76e4bd31c97133911f1 # v4.2.0

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Playwright browsers cache
        id: playwright-cache
        uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: /home/runner/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @zama-fhe/test-nextjs exec playwright install --with-deps chromium

      - name: Save Playwright browsers cache
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: /home/runner/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Restore Hardhat dependencies cache
        id: hardhat-deps-cache
        uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: hardhat/node_modules
          key: hardhat-deps-${{ runner.os }}-${{ hashFiles('hardhat/package-lock.json') }}

      - name: Install Hardhat dependencies
        if: steps.hardhat-deps-cache.outputs.cache-hit != 'true'
        run: pnpm hardhat:install

      - name: Validate Hardhat binary when cache is restored
        if: steps.hardhat-deps-cache.outputs.cache-hit == 'true'
        run: |
          if [ ! -x hardhat/node_modules/.bin/hardhat ]; then
            echo "Hardhat binary missing after cache restore, reinstalling dependencies."
            pnpm hardhat:install
          fi

      - name: Save Hardhat dependencies cache
        if: steps.hardhat-deps-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: hardhat/node_modules
          key: hardhat-deps-${{ runner.os }}-${{ hashFiles('hardhat/package-lock.json') }}

      - name: Restore Hardhat compilation cache
        id: hardhat-build-cache
        uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            hardhat/artifacts
            hardhat/cache
            hardhat/typechain-types
          key: hardhat-build-${{ runner.os }}-${{ hashFiles('hardhat/contracts/**/*.sol', 'hardhat/hardhat.config.ts') }}

      - name: Compile Hardhat contracts
        if: steps.hardhat-build-cache.outputs.cache-hit != 'true'
        run: pnpm hardhat:compile

      - name: Save Hardhat compilation cache
        if: steps.hardhat-build-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            hardhat/artifacts
            hardhat/cache
            hardhat/typechain-types
          key: hardhat-build-${{ runner.os }}-${{ hashFiles('hardhat/contracts/**/*.sol', 'hardhat/hardhat.config.ts') }}

      - name: Restore Next.js build cache
        id: nextjs-build-cache
        uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: packages/test-nextjs/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('packages/test-nextjs/src/**/*.ts', 'packages/test-nextjs/src/**/*.tsx', 'packages/sdk/src/**/*.ts', 'packages/sdk/src/**/*.tsx', 'packages/react-sdk/src/**/*.ts', 'packages/react-sdk/src/**/*.tsx') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Build SDK packages
        run: pnpm build

      - name: Build Next.js test-nextjs
        run: pnpm build:test-nextjs
        env:
          NEXT_PUBLIC_NETWORK: hardhat

      - name: Save Next.js build cache
        if: steps.nextjs-build-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: packages/test-nextjs/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('packages/test-nextjs/src/**/*.ts', 'packages/test-nextjs/src/**/*.tsx', 'packages/sdk/src/**/*.ts', 'packages/sdk/src/**/*.tsx', 'packages/react-sdk/src/**/*.ts', 'packages/react-sdk/src/**/*.tsx') }}

      - name: Run Next.js Playwright tests
        run: pnpm e2e:test:nextjs
        env:
          NEXT_PUBLIC_NETWORK: hardhat

      - name: Run Vite Playwright tests
        run: pnpm e2e:test:vite
        env:
          VITE_NETWORK: hardhat

      - name: Upload test results
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-nextjs
          path: packages/test-nextjs/playwright/test-results/
          retention-days: 7

      - name: Upload Vite test results
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-vite
          path: packages/test-vite/playwright/test-results/
          retention-days: 7
