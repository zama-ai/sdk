name: Release

on:
  push:
    branches: [main, prerelease]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

defaults:
  run:
    shell: bash -euo pipefail {0}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-branch:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Validate target branch
        run: |
          if [[ "${GITHUB_REF_NAME}" != "main" && "${GITHUB_REF_NAME}" != "prerelease" ]]; then
            echo "::error::Releases are only allowed from main or prerelease (got: ${GITHUB_REF_NAME})."
            exit 1
          fi

  vitest:
    needs: [validate-branch]
    if: ${{ !cancelled() && !failure() }}
    uses: ./.github/workflows/vitest.yml

  playwright:
    needs: [validate-branch]
    if: ${{ !cancelled() && !failure() }}
    uses: ./.github/workflows/playwright.yml
    secrets:
      SUBMODULE_TOKEN: ${{ secrets.SUBMODULE_TOKEN }}

  api-report:
    needs: [validate-branch]
    if: ${{ !cancelled() && !failure() }}
    uses: ./.github/workflows/api-report.yml

  release:
    needs: [vitest, playwright, api-report]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: pnpm

      - name: Ensure npm 11
        run: |
          npm i -g npm@^11
          npm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Semantic release
        id: release
        run: |
          pnpm release:ci 2>&1 | tee /tmp/release-output.txt
          if grep -q "Published release" /tmp/release-output.txt; then
            echo "released=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.SDK_RELEASER_TOKEN }}

      - name: Publish to npm
        if: steps.release.outputs.released == 'true'
        run: |
          version=$(node -p "require('./packages/sdk/package.json').version")
          if [[ "$version" == *-* ]]; then
            npm_tag="${version#*-}"   # e.g. "alpha.10" from "1.0.0-alpha.10"
            npm_tag="${npm_tag%%.*}"   # e.g. "alpha"
          else
            npm_tag="latest"
          fi
          echo "Publishing v${version} with tag '${npm_tag}'"
          cd packages/sdk
          npm publish --access public --tag "${npm_tag}"
          cd ../react-sdk
          npm publish --access public --tag "${npm_tag}"
        env:
          NPM_CONFIG_PROVENANCE: false # Re-enable once repo is public

      - name: Verify release was published
        if: github.event_name == 'workflow_dispatch'
        run: |
          if ! grep -q "Published release" /tmp/release-output.txt; then
            echo "::error::semantic-release completed but no release was published."
            echo "Common causes: no releasable commits, branch not configured, or authentication issue."
            exit 1
          fi
