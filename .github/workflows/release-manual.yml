name: Release (Manual)

on:
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

defaults:
  run:
    shell: bash -euo pipefail {0}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Validate target branch
        run: |
          if [[ "${GITHUB_REF_NAME}" != "main" && "${GITHUB_REF_NAME}" != "prerelease" ]]; then
            echo "::error::Manual releases are only allowed from main or prerelease (got: ${GITHUB_REF_NAME})."
            exit 1
          fi

  lint:
    needs: [validate-branch]
    uses: ./.github/workflows/lint.yml

  vitest:
    needs: [validate-branch]
    uses: ./.github/workflows/vitest.yml

  playwright:
    needs: [validate-branch]
    uses: ./.github/workflows/playwright.yml

  release:
    needs: [lint, vitest, playwright]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Sync branch with remote
        run: |
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git checkout -B "${{ github.ref_name }}" "origin/${{ github.ref_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.SDK_RELEASER_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: pnpm

      - name: Ensure npm 11
        run: |
          pnpm add -g npm@^11
          npm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build packages
        run: pnpm build

      - name: Semantic release
        id: release
        run: |
          set +e
          pnpm release:ci 2>&1 | tee /tmp/release-output.txt
          exit_code=${PIPESTATUS[0]}
          set -e
          if grep -q "Published release" /tmp/release-output.txt; then
            echo "released=true" >> "$GITHUB_OUTPUT"
          fi
          exit "$exit_code"
        env:
          GITHUB_TOKEN: ${{ secrets.SDK_RELEASER_TOKEN }}

      - name: Publish to npm
        if: steps.release.outputs.released == 'true'
        run: |
          version=$(node -p "require('./packages/sdk/package.json').version")
          if [[ "$version" == *-* ]]; then
            npm_tag="${version#*-}"   # e.g. "alpha.10" from "1.0.0-alpha.10"
            npm_tag="${npm_tag%%.*}"   # e.g. "alpha"
          else
            npm_tag="latest"
          fi
          echo "Publishing v${version} with tag '${npm_tag}'"
          cd packages/sdk
          npm publish --access public --tag "${npm_tag}"
          cd ../react-sdk
          npm publish --access public --tag "${npm_tag}"
        env:
          NPM_CONFIG_PROVENANCE: true

      - name: Verify release was published
        run: |
          if ! grep -q "Published release" /tmp/release-output.txt; then
            echo "::error::semantic-release completed but no release was published."
            echo "Common causes: no releasable commits, branch not configured, or authentication issue."
            exit 1
          fi
