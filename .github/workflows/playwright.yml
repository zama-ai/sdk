name: Playwright

on:
  workflow_run:
    workflows: [Vitest]
    branches: [main]
    types: [completed]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Checkout submodules
        run: |
          git config --global url."https://${{ secrets.SUBMODULE_TOKEN }}@github.com/".insteadOf "https://github.com/"
          git submodule sync --recursive
          git submodule update --init --recursive --depth=1

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SDK packages
        run: pnpm build

      - name: Restore Playwright browsers cache
        id: playwright-cache
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: /home/runner/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @zama-fhe/test-app exec playwright install --with-deps chromium

      - name: Save Playwright browsers cache
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: /home/runner/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Restore Hardhat dependencies cache
        id: hardhat-deps-cache
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: hardhat/node_modules
          key: hardhat-deps-${{ runner.os }}-${{ hashFiles('hardhat/package-lock.json') }}

      - name: Install Hardhat dependencies
        if: steps.hardhat-deps-cache.outputs.cache-hit != 'true'
        run: pnpm hardhat:install

      - name: Save Hardhat dependencies cache
        if: steps.hardhat-deps-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: hardhat/node_modules
          key: hardhat-deps-${{ runner.os }}-${{ hashFiles('hardhat/package-lock.json') }}

      - name: Restore Hardhat compilation cache
        id: hardhat-build-cache
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            hardhat/artifacts
            hardhat/cache
            hardhat/typechain-types
          key: hardhat-build-${{ runner.os }}-${{ hashFiles('hardhat/contracts/**/*.sol', 'hardhat/hardhat.config.ts') }}

      - name: Compile Hardhat contracts
        if: steps.hardhat-build-cache.outputs.cache-hit != 'true'
        run: pnpm hardhat:compile

      - name: Save Hardhat compilation cache
        if: steps.hardhat-build-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            hardhat/artifacts
            hardhat/cache
            hardhat/typechain-types
          key: hardhat-build-${{ runner.os }}-${{ hashFiles('hardhat/contracts/**/*.sol', 'hardhat/hardhat.config.ts') }}

      - name: Restore Next.js build cache
        id: nextjs-build-cache
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: packages/test-app/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('packages/test-app/src/**/*.ts', 'packages/test-app/src/**/*.tsx') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Build Next.js test-app
        run: pnpm build:test-app
        env:
          NEXT_PUBLIC_NETWORK: hardhat

      - name: Save Next.js build cache
        if: steps.nextjs-build-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: packages/test-app/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('packages/test-app/src/**/*.ts', 'packages/test-app/src/**/*.tsx') }}

      - name: Run Playwright tests
        run: pnpm e2e:test

      - name: Upload test results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: packages/test-app/playwright/test-results/
          retention-days: 7
