name: Release

on:
  push:
    branches: [main, prerelease]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Verify npm version for trusted publishing
        run: |
          npm_version="$(npm --version)"
          node -e '
            const min = [11, 5, 1];
            const current = process.argv[1].split(".").map(Number);
            const valid = current.length >= 3 && current.every((n) => Number.isFinite(n));
            if (!valid) {
              console.error(`Unable to parse npm version: ${process.argv[1]}`);
              process.exit(1);
            }
            for (let i = 0; i < 3; i += 1) {
              if ((current[i] ?? 0) > min[i]) process.exit(0);
              if ((current[i] ?? 0) < min[i]) {
                console.error(`npm ${process.argv[1]} is too old for trusted publishing (need >= ${min.join(".")}).`);
                process.exit(1);
              }
            }
          ' "$npm_version"

      - name: Semantic release
        run: pnpm release:ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
