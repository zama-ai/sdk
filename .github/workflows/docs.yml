name: LLM Docs

on:
  pull_request:
    branches: [main, prerelease]
    paths:
      - "docs/**"
      - "examples/**/README.md"
      - "examples/**/WALKTHROUGH.md"
      - "README.md"
      - "packages/*/README.md"
      - "packages/*/etc/**"
      - "scripts/llm/**"
      - "llms.txt"
      - "llms-full.txt"
      - "package.json"
      - "pnpm-lock.yaml"
  workflow_call:

concurrency:
  group: llm-docs-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: false

      - name: Setup pnpm
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build GitBook documentation
        run: pnpm docs:build

      - name: Verify LLM corpus artifacts are up to date
        run: pnpm llm:check
