name: Publish to npm (from tag)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to publish (e.g. v2.4.0)"
        required: true
        type: string
      npm-tag:
        description: "npm dist-tag (auto-detected from version if left empty)"
        required: false
        type: string
      dry-run:
        description: "Dry run (log what would be published without actually publishing)"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

defaults:
  run:
    shell: bash -euo pipefail {0}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.tag }}

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: pnpm

      - name: Ensure npm >=11
        run: |
          npm_v="$(npm --version)"
          if [[ "${npm_v%%.*}" -lt 11 ]]; then
            echo "Bundled npm ${npm_v} is too old; installing npm 11"
            pnpm add -g npm@^11
            echo "$(pnpm bin -g)" >> "$GITHUB_PATH"
            export PATH="$(pnpm bin -g):$PATH"
          fi
          echo "npm $(npm --version)"
          [[ "$(npm --version | cut -d. -f1)" -ge 11 ]]

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build packages
        run: pnpm build

      - name: Resolve version and npm tag
        id: npm-tag
        env:
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_NPM_TAG: ${{ inputs.npm-tag }}
        run: |
          version=$(node -p "require('./packages/sdk/package.json').version")
          expected="${INPUT_TAG#v}"  # strip leading v
          if [[ "$version" != "$expected" ]]; then
            echo "::error::package.json version (${version}) does not match git tag (${INPUT_TAG}). Aborting."
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

          if [[ -n "${INPUT_NPM_TAG}" ]]; then
            echo "tag=${INPUT_NPM_TAG}" >> "$GITHUB_OUTPUT"
          elif [[ "$version" == *-* ]]; then
            npm_tag="${version#*-}"   # e.g. "alpha.10" from "1.0.0-alpha.10"
            npm_tag="${npm_tag%%.*}"   # e.g. "alpha"
            echo "tag=${npm_tag}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        env:
          NPM_CONFIG_PROVENANCE: true
          VERSION: ${{ steps.npm-tag.outputs.version }}
          NPM_TAG: ${{ steps.npm-tag.outputs.tag }}
          DRY_RUN: ${{ inputs.dry-run }}
        run: |
          echo "Publishing v${VERSION} with tag '${NPM_TAG}'"

          flags=(--access public --tag "${NPM_TAG}")
          if [[ "${DRY_RUN}" == "true" ]]; then
            flags+=(--dry-run)
            echo "::notice::DRY RUN — packages will not actually be published"
          fi

          cd packages/sdk
          npm publish "${flags[@]}"
          cd ../react-sdk
          npm publish "${flags[@]}"

      - name: Summary
        if: success()
        env:
          VERSION: ${{ steps.npm-tag.outputs.version }}
          NPM_TAG: ${{ steps.npm-tag.outputs.tag }}
          DRY_RUN: ${{ inputs.dry-run }}
        run: |
          if [[ "${DRY_RUN}" == "true" ]]; then
            echo "### 🏜️ Dry run complete" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### ✅ Published to npm" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Package | Version | Tag |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|---------|-----|" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`@zama-fhe/sdk\` | \`${VERSION}\` | \`${NPM_TAG}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`@zama-fhe/react-sdk\` | \`${VERSION}\` | \`${NPM_TAG}\` |" >> "$GITHUB_STEP_SUMMARY"
