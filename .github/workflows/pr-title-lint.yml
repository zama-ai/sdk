name: PR Title Lint

on:
  pull_request:
    branches: [main, prerelease]
    types: [opened, edited, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  pull-requests: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate Conventional Commit PR title
        run: |
          node <<'NODE'
            const { readFileSync } = require("node:fs");
            const event = JSON.parse(readFileSync(process.env.GITHUB_EVENT_PATH, "utf8"));
            const title = event.pull_request?.title ?? "";
            const re = /^(feat|fix|perf|refactor|docs|chore|test|build|ci|revert|style)(\([^)]+\))?!?: .+/;
            if (!re.test(title)) {
              console.error("PR title must follow Conventional Commits (e.g. fix: ..., feat(scope): ...).");
              console.error(`Current title: ${JSON.stringify(title)}`);
              process.exit(1);
            }
          NODE
