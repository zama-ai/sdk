version: 2
updates:
  - package-ecosystem: npm
    target-branch: prerelease
    directories:
      - /
      - /packages/sdk
      - /packages/react-sdk
      - /packages/test-nextjs
    schedule:
      interval: weekly
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-patch

  - package-ecosystem: github-actions
    target-branch: prerelease
    directory: /
    schedule:
      interval: weekly
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-patch
