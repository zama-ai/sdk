[profile.default]
src = "src"
out = "out"
libs = ["lib", "dependencies"]
solc = "0.8.27"
evm_version = "cancun"
optimizer = true
optimizer_runs = 100

fs_permissions = [{ access = "read-write", path = "./" }]

[profile.default.fmt]
line_length = 120

[dependencies]
"protocol-apps" = { version = "49b417a4", git = "https://github.com/zama-ai/protocol-apps", rev = "49b417a4" }
"@openzeppelin-confidential-contracts" = { version = "0.4.0", git = "https://github.com/OpenZeppelin/openzeppelin-confidential-contracts", tag = "v0.4.0" }
